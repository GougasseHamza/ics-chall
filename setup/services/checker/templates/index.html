<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Line 4 Incident Validation</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#071014;color:#d7e8e8;font:14px ui-monospace,SFMono-Regular,Menlo,monospace}
    main{width:min(620px,calc(100% - 30px));border:1px solid #29464e;background:#0e2025;padding:28px;box-shadow:0 25px 70px #0008}
    h1{font-size:18px;letter-spacing:.12em;color:#52d7d2}p{color:#8ba4a8}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:24px 0}
    .card{border:1px solid #29464e;padding:13px;background:#09171b}.label{font-size:10px;color:#718b90}.value{font-size:20px;font-weight:bold;margin-top:5px}
    .flag{padding:16px;border:1px dashed #4aa86b;color:#76e89d;background:#0a2818;word-break:break-all}.pending{border-color:#805d2e;color:#ffc857;background:#29200d}
    button{background:#173a41;border:1px solid #3e777d;color:#e2f1f1;padding:10px 18px;font:inherit;cursor:pointer}
    @media(max-width:560px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body><main><h1>LINE 4 // INCIDENT VALIDATION</h1><p>This service validates physical process impact. Network access or a transient alarm alone is insufficient.</p>
  <div class="grid"><div class="card"><div class="label">MACHINE STATE</div><div id="state" class="value">--</div></div><div class="card"><div class="label">PUMP DAMAGE</div><div id="damage" class="value">--</div></div><div class="card"><div class="label">DRY RUN</div><div id="dry" class="value">--</div></div></div>
  <div id="result" class="flag pending">No qualifying equipment failure has been recorded.</div><p><button onclick="check()">RECHECK STATE</button></p>
</main><script>async function check(){const d=await(await fetch('/api/claim',{cache:'no-store'})).json();state.textContent=d.machine_state;damage.textContent=d.pump_damage.toFixed(1)+'%';dry.textContent=d.dry_run_seconds.toFixed(1)+' s';result.textContent=d.solved?d.flag:'No qualifying equipment failure has been recorded.';result.className=d.solved?'flag':'flag pending'}check();setInterval(check,2500)</script></body></html>
